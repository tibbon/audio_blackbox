name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      lane:
        description: "Fastlane lane to run"
        required: true
        default: "beta"
        type: choice
        options:
          - beta
          - metadata
          - check

concurrency:
  group: release
  cancel-in-progress: false

permissions: {}

jobs:
  # ── GitHub Release binaries ───────────────────────────────────────
  # Builds CLI binaries on Linux and macOS. macOS also includes the
  # SwiftUI .app bundle as a zip.
  github-release:
    name: GitHub Release (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: blackbox-linux-amd64
          - os: macos-latest
            artifact: blackbox-macos-arm64

    steps:
    - uses: actions/checkout@v6

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust dependencies
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-release-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-release-

    - name: Install Linux dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev pkg-config

    - name: Build CLI release
      run: cargo build --release

    - name: Copy CLI binary
      run: cp target/release/blackbox ${{ matrix.artifact }}

    - name: Build SwiftUI app (macOS only)
      if: matrix.os == 'macos-latest'
      run: |
        cargo build --release --features ffi
        xcodebuild -project BlackBoxApp/BlackBoxApp.xcodeproj -scheme BlackBoxApp -configuration Release DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" CODE_SIGN_IDENTITY="-" build
        BUILT_APP=$(xcodebuild -project BlackBoxApp/BlackBoxApp.xcodeproj -scheme BlackBoxApp -configuration Release DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" -showBuildSettings 2>/dev/null | grep ' BUILT_PRODUCTS_DIR' | sed 's/.*= //')
        cp -R "$BUILT_APP/BlackBox Audio Recorder.app" "BlackBox Audio Recorder.app"
        ditto -c -k --keepParent "BlackBox Audio Recorder.app" "BlackBox-Audio-Recorder.app.zip"

    - name: Upload CLI binary
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ matrix.artifact }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload macOS app bundle
      if: matrix.os == 'macos-latest'
      uses: softprops/action-gh-release@v2
      with:
        files: BlackBox-Audio-Recorder.app.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── TestFlight / App Store ────────────────────────────────────────
  # Builds and uploads via Fastlane. Protected environment requires
  # manual approval from the repo owner.
  testflight:
    name: Fastlane (${{ github.event.inputs.lane || 'beta' }})
    runs-on: macos-latest
    environment: release
    permissions:
      contents: read
    defaults:
      run:
        working-directory: BlackBoxApp

    steps:
    - uses: actions/checkout@v6

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust dependencies
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-release-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-release-

    - name: Extract version from tag
      id: version
      run: |
        if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version $VERSION"
        else
          echo "version=" >> "$GITHUB_OUTPUT"
          echo "Manual run — using version from Xcode project"
        fi
      working-directory: ..

    - name: Build Rust static library (FFI)
      run: cd .. && make rust-lib

    - name: Install signing certificate
      env:
        APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      run: |
        # Create a temporary keychain
        KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
        KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

        # Import certificate
        CERT_PATH=$RUNNER_TEMP/certificate.p12
        echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
        security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
          -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
        rm "$CERT_PATH"

        # Allow codesign to access the keychain
        security set-key-partition-list -S apple-tool:,apple: \
          -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: "3.3"
        working-directory: BlackBoxApp

    - name: Install Fastlane
      run: gem install fastlane

    - name: Write ASC API key file
      env:
        ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      run: |
        # xcodebuild needs the .p8 key as a file for -allowProvisioningUpdates
        KEY_DIR="$RUNNER_TEMP/asc_keys"
        mkdir -p "$KEY_DIR"
        echo "$ASC_KEY_CONTENT" | base64 --decode > "$KEY_DIR/AuthKey_${ASC_KEY_ID}.p8"
        echo "ASC_KEY_PATH=$KEY_DIR/AuthKey_${ASC_KEY_ID}.p8" >> "$GITHUB_ENV"
      working-directory: ..

    - name: Run Fastlane
      env:
        ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        RELEASE_VERSION: ${{ steps.version.outputs.version }}
        SKIP_RUST_BUILD: "true"
      run: |
        # Decode base64 key content for Fastlane API auth
        export ASC_KEY_CONTENT=$(echo "$ASC_KEY_CONTENT" | base64 --decode)
        fastlane "${{ github.event.inputs.lane || 'beta' }}"

    - name: Clean up secrets
      if: always()
      run: |
        KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
        if [ -f "$KEYCHAIN_PATH" ]; then
          security delete-keychain "$KEYCHAIN_PATH"
        fi
        rm -rf "$RUNNER_TEMP/asc_keys"

name: Ignored tests

# Long-running benchmark / performance / allocation tests are marked
# `#[ignore]` so they don't run on the per-PR `cargo test` lane (DOLL-131).
# They still exercise real code paths; this lane runs them on a cadence
# so they don't silently rot as production evolves.
#
# Triggers:
#   - weekly schedule (Monday 08:00 UTC)
#   - manual workflow_dispatch (anyone with write access can kick off)

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

# Cancel an in-progress run if a new one starts on the same ref —
# a manual workflow_dispatch overlapping the weekly cron would
# otherwise pile two long ignored-tests runs on top of each other.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ignored:
    name: "Run ignored tests"
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Cache Rust dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-ignored-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-ignored-

      # --test-threads=1 matches the per-PR `test` lane and avoids
      # contention between benchmarks that allocate / measure throughput.
      - name: Run ignored tests
        run: cargo test --no-default-features -- --ignored --test-threads=1

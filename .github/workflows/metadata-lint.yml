name: Metadata Lint

# Run the App Store Connect metadata linter (scripts/lint-app-store-metadata.py)
# whenever the metadata or the linter itself changes, so schema drift /
# over-length copy is caught on the PR instead of mid-deploy on the Fastlane
# runner (DOLL-271). The script is stdlib-only, so a plain ubuntu runner with
# its preinstalled python3 is enough — no setup-python or pip step needed.
on:
  pull_request:
    paths:
      - "BlackBoxApp/fastlane/metadata/**"
      - "scripts/lint-app-store-metadata.py"
      # DOLL-390: submission-affecting Fastlane config (deliver/precheck
      # options, age-rating JSON) must also re-trigger the lint, or those
      # changes merge unchecked.
      - "BlackBoxApp/fastlane/Fastfile"
      - "BlackBoxApp/fastlane/*.json"

permissions: {}

jobs:
  metadata-lint:
    name: App Store metadata lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

    - name: Lint App Store metadata
      run: python3 scripts/lint-app-store-metadata.py

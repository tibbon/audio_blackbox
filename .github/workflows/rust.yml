name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Formatting ─────────────────────────────────────────────────────
  # Fast check — fails early before burning CI minutes on builds.
  fmt:
    name: Format
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

    - name: Install Rust
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      with:
        components: rustfmt

    - name: Check formatting
      run: cargo fmt --all -- --check

  # ── Lint ───────────────────────────────────────────────────────────
  # Clippy on all targets (lib, bins, tests, benchmarks).
  lint:
    name: Clippy
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

    - name: Install Rust
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      with:
        components: clippy

    - name: Cache Rust dependencies
      # Per-feature cache keys (DOLL-271). The stable-toolchain lanes compile
      # divergent feature sets — clippy/test build no features, bench builds
      # `--features benchmarking`, swift-app builds `--features ffi`. A single
      # shared key (the prior DOLL-166 design) meant only the first job to
      # finish saved its target/, and actions/cache won't overwrite an existing
      # key, so feature artifacts built only by later jobs were dropped and
      # rebuilt every run. Distinct keys per feature bucket let each persist
      # its own target/. MSRV keeps its own key (different toolchain).
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-nofeat-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-nofeat-

    - name: Run clippy (all targets)
      run: cargo clippy --all-targets --no-default-features -- -D warnings

    - name: Check Cargo.lock is up-to-date
      run: cargo update --locked --dry-run

  # ── MSRV verification ─────────────────────────────────────────────
  # Cargo.toml claims `rust-version = "1.95"`. Without this job an
  # MSRV regression (someone adopting a 1.96-only feature) ships
  # silently because every other job uses `@stable`. Pin to the MSRV
  # toolchain and `cargo check`. Bump the toolchain ref in lockstep
  # with `Cargo.toml`'s `rust-version` field. (DOLL-150)
  msrv:
    name: MSRV (1.95)
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

    - name: Install Rust 1.95
      uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582  # 1.95

    - name: Cache Rust dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-msrv-1.95-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-msrv-1.95-

    - name: cargo check (MSRV)
      run: cargo check --all-targets --no-default-features

  # ── Tests ──────────────────────────────────────────────────────────
  # macOS-only — the shipped product is Mac App Store; Ubuntu added cost
  # without adding signal for the SwiftUI / CoreAudio surface (DOLL-153).
  test:
    name: Test (macos-latest)
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

    - name: Install Rust
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

    - name: Cache Rust dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-nofeat-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-nofeat-

    - name: Run tests
      run: cargo test --verbose -- --test-threads=1

  # ── FFI lint + tests ───────────────────────────────────────────────
  # src/ffi.rs is the C-ABI surface the App Store binary actually links,
  # gated behind `--features ffi`. Every other lane runs --no-default-features,
  # so without this job ffi.rs was never under `-D warnings` and the 26 tests
  # in src/tests/ffi_tests.rs never ran in CI (DOLL-346). Cargo features are
  # not additive for the test binary, so this is a distinct pass from the
  # no-features `test` lane above.
  ffi:
    name: FFI (lint + test)
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

    - name: Install Rust
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      with:
        components: clippy

    # Distinct key from swift-app's cargo-ffi (which caches the *release* ffi
    # build): this lane builds dev-profile clippy + test artifacts, and two
    # jobs sharing one key race to save it (only the first wins — DOLL-271).
    - name: Cache Rust dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-ffitest-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-ffitest-

    - name: Run clippy (FFI, all targets)
      run: cargo clippy --all-targets --features ffi -- -D warnings

    - name: Run tests (FFI)
      run: cargo test --features ffi -- --test-threads=1

    # DOLL-369: ACKNOWLEDGMENTS.md is generated from cargo metadata over the
    # shipped (--features ffi) dependency set. Fail if it drifted — i.e. a dep
    # was added/removed/relicensed without regenerating the attribution.
    - name: Check third-party license attribution
      run: python3 scripts/gen-acknowledgments.py --check

  # ── Security audit ─────────────────────────────────────────────────
  # Check dependencies for known vulnerabilities (RUSTSEC advisories).
  audit:
    name: Security audit
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

    - name: Install cargo-audit
      uses: taiki-e/install-action@e96017355c8b613bff850d75294a872bbc98a6ef  # cargo-audit

    - name: Run audit
      # --deny warnings escalates RUSTSEC unmaintained/yanked advisories
      # from notice-only to lane-failing. Without this, deps that age out
      # (cpal-style) print warnings but the lane stays green for months.
      # If a specific advisory needs a temporary exemption, add it to
      # audit.toml with a rationale + expiry rather than dropping the flag.
      run: cargo audit --deny warnings

  # ── Benchmark smoke test ───────────────────────────────────────────
  # Builds the bench binary in release mode and runs a quick smoke test
  # to catch regressions. Not for perf numbers (CI runners are noisy).
  bench:
    name: Benchmark smoke test
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

    - name: Install Rust
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

    - name: Cache Rust dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-bench-

    - name: Build bench binary (release)
      run: cargo build --release --bin bench-writer --features benchmarking

    # single/split (hound direct-write): 10x is well below the documented
    # worst case (19x) so noisy GH runners don't flap, but enough to catch a
    # ~50% regression.
    - name: Smoke test — single mode (64ch, 2s)
      run: scripts/bench-assert.sh 10 -- target/release/bench-writer --channels 64 --seconds 2 --mode single

    - name: Smoke test — split mode (16ch, 2s)
      run: scripts/bench-assert.sh 10 -- target/release/bench-writer --channels 16 --seconds 2 --mode split

    # pipeline drives the REAL production writer (DOLL-251): WriterThreadState
    # + writer_thread_main + RawWavWriter through the rtrb ring and the
    # adaptive-sleep drain loop. It is inherently ~3x slower than the hound
    # direct-write modes (thread handoff + 1-5ms drain sleeps), so the floor is
    # set proportionally lower (~4x) to keep the same headroom the 10x modes
    # have — still enough to catch a major regression in shipped code.
    - name: Smoke test — pipeline mode (64ch, 2s)
      run: scripts/bench-assert.sh 4 -- target/release/bench-writer --channels 64 --seconds 2 --mode pipeline

  # ── Swift app build (macOS) ────────────────────────────────────────
  # Builds the Rust static library with FFI exports and the SwiftUI
  # menu bar app via xcodebuild.
  swift-app:
    name: Swift app
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

    # DOLL-160: the committed project.pbxproj is the generated output of
    # `xcodegen generate` against project.yml. Regenerate with a PINNED
    # xcodegen and fail if the result differs from what's committed — this
    # catches a project.yml edit (new framework, build setting, source dir)
    # that wasn't followed by `make xcodegen`. Runs first so drift fails fast
    # before the multi-minute Rust/Swift build. xcodegen is pinned (by version
    # AND sha256) because its pbxproj output format varies across versions —
    # an unpinned install would diff against the committed baseline spuriously.
    - name: Check pbxproj matches project.yml
      run: |
        set -euo pipefail
        XCODEGEN_VERSION="2.45.3"
        XCODEGEN_SHA256="0c90f4d28ca57335f9fa78cf5bf6dabfe20a232036dabe36de2eef79cb7c0878"
        TOOLDIR="$RUNNER_TEMP/xcodegen"
        mkdir -p "$TOOLDIR"
        # DOLL-430: retry on transient GitHub CDN errors (a 504 here once failed
        # the whole required job). The sha256 check below guards integrity, so
        # retrying the download is safe.
        curl -fsSL --retry 5 --retry-all-errors --retry-delay 2 -o "$TOOLDIR/xcodegen.zip" \
          "https://github.com/yonaskolb/XcodeGen/releases/download/${XCODEGEN_VERSION}/xcodegen.zip"
        echo "${XCODEGEN_SHA256}  $TOOLDIR/xcodegen.zip" | shasum -a 256 -c -
        unzip -q "$TOOLDIR/xcodegen.zip" -d "$TOOLDIR"
        # `share/` must stay a sibling of `bin/` so the binary finds its SettingPresets.
        (cd BlackBoxApp && "$TOOLDIR/xcodegen/bin/xcodegen" generate)
        if ! git diff --exit-code -- BlackBoxApp/BlackBoxApp.xcodeproj; then
          echo "::error::project.pbxproj is out of sync with project.yml. Run 'make xcodegen' and commit the result."
          exit 1
        fi

    - name: Install Rust
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

    - name: Cache Rust dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-ffi-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-ffi-

    # DOLL-271: cache Xcode DerivedData — the cold-cache xcodebuild is the
    # dominant cost of this job. Keyed on the Swift sources + the generated
    # project so a source change busts it; restore-keys allows a warm partial
    # restore for incremental rebuilds. (NOT applied to the CodeQL Swift job:
    # CodeQL traces every swiftc invocation, and a fully-cached build would
    # skip compilation and starve the extractor.)
    - name: Cache Xcode DerivedData
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
      with:
        path: ~/Library/Developer/Xcode/DerivedData
        key: ${{ runner.os }}-deriveddata-${{ hashFiles('BlackBoxApp/**/*.swift', 'BlackBoxApp/BlackBoxApp.xcodeproj/project.pbxproj') }}
        restore-keys: |
          ${{ runner.os }}-deriveddata-

    # DOLL-190: hand-maintained include/blackbox_ffi.h drift check.
    # Runs *before* the Rust build so a header mismatch fails fast
    # (the actual build / Swift tests would also catch most cases,
    # but only after a multi-minute rebuild).
    - name: Check FFI header parity
      run: ./scripts/check-ffi-header.sh

    - name: Build Rust static library (FFI)
      run: cargo build --release --features ffi

    - name: Run Swift tests
      run: xcodebuild test -project BlackBoxApp/BlackBoxApp.xcodeproj -scheme BlackBoxApp -destination 'platform=macOS' CODE_SIGN_IDENTITY="-"

    - name: Build SwiftUI app
      run: xcodebuild -project BlackBoxApp/BlackBoxApp.xcodeproj -scheme BlackBoxApp -configuration Release DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" CODE_SIGN_IDENTITY="-" build


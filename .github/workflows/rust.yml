name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Formatting ─────────────────────────────────────────────────────
  # Fast check — fails early before burning CI minutes on builds.
  fmt:
    name: Format
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

    - name: Install Rust
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      with:
        components: rustfmt

    - name: Check formatting
      run: cargo fmt --all -- --check

  # ── Lint ───────────────────────────────────────────────────────────
  # Clippy on all targets (lib, bins, tests, benchmarks).
  lint:
    name: Clippy
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

    - name: Install Rust
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      with:
        components: clippy

    - name: Cache Rust dependencies
      # Single shared key per OS across all stable-toolchain lanes
      # (clippy / test / bench / swift-app / release). cargo's target/
      # already segregates artifacts by feature combination internally,
      # so jobs sharing the cache coexist without contamination. MSRV
      # uses its own key (different toolchain version → incompatible
      # target/ artifacts). Parallel writers to the same key race on
      # cache reservation and produce noisy "cache already exists"
      # warnings — that's expected and harmless: first writer wins,
      # subsequent ones noop. (DOLL-166)
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Run clippy (all targets)
      run: cargo clippy --all-targets --no-default-features -- -D warnings

    - name: Check Cargo.lock is up-to-date
      run: cargo update --locked --dry-run

  # ── MSRV verification ─────────────────────────────────────────────
  # Cargo.toml claims `rust-version = "1.95"`. Without this job an
  # MSRV regression (someone adopting a 1.96-only feature) ships
  # silently because every other job uses `@stable`. Pin to the MSRV
  # toolchain and `cargo check`. Bump the toolchain ref in lockstep
  # with `Cargo.toml`'s `rust-version` field. (DOLL-150)
  msrv:
    name: MSRV (1.95)
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

    - name: Install Rust 1.95
      uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582  # 1.95

    - name: Cache Rust dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-msrv-1.95-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-msrv-1.95-

    - name: cargo check (MSRV)
      run: cargo check --all-targets --no-default-features

  # ── Tests ──────────────────────────────────────────────────────────
  # macOS-only — the shipped product is Mac App Store; Ubuntu added cost
  # without adding signal for the SwiftUI / CoreAudio surface (DOLL-153).
  test:
    name: Test (macos-latest)
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

    - name: Install Rust
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

    - name: Cache Rust dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Run tests
      run: cargo test --verbose -- --test-threads=1

  # ── Security audit ─────────────────────────────────────────────────
  # Check dependencies for known vulnerabilities (RUSTSEC advisories).
  audit:
    name: Security audit
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

    - name: Install cargo-audit
      uses: taiki-e/install-action@e96017355c8b613bff850d75294a872bbc98a6ef  # cargo-audit

    - name: Run audit
      # --deny warnings escalates RUSTSEC unmaintained/yanked advisories
      # from notice-only to lane-failing. Without this, deps that age out
      # (cpal-style) print warnings but the lane stays green for months.
      # If a specific advisory needs a temporary exemption, add it to
      # audit.toml with a rationale + expiry rather than dropping the flag.
      run: cargo audit --deny warnings

  # ── Benchmark smoke test ───────────────────────────────────────────
  # Builds the bench binary in release mode and runs a quick smoke test
  # to catch regressions. Not for perf numbers (CI runners are noisy).
  bench:
    name: Benchmark smoke test
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

    - name: Install Rust
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

    - name: Cache Rust dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Build bench binary (release)
      run: cargo build --release --bin bench-writer --features benchmarking

    # 10x is well below the documented worst case (19x) so noisy GH runners
    # don't flap, but enough to catch a ~50% regression.
    - name: Smoke test — single mode (64ch, 2s)
      run: scripts/bench-assert.sh 10 -- target/release/bench-writer --channels 64 --seconds 2 --mode single

    - name: Smoke test — split mode (16ch, 2s)
      run: scripts/bench-assert.sh 10 -- target/release/bench-writer --channels 16 --seconds 2 --mode split

    - name: Smoke test — pipeline mode (64ch, 2s)
      run: scripts/bench-assert.sh 10 -- target/release/bench-writer --channels 64 --seconds 2 --mode pipeline

  # ── Swift app build (macOS) ────────────────────────────────────────
  # Builds the Rust static library with FFI exports and the SwiftUI
  # menu bar app via xcodebuild.
  swift-app:
    name: Swift app
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

    - name: Install Rust
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

    - name: Cache Rust dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Build Rust static library (FFI)
      run: cargo build --release --features ffi

    - name: Run Swift tests
      run: xcodebuild test -project BlackBoxApp/BlackBoxApp.xcodeproj -scheme BlackBoxApp -destination 'platform=macOS' CODE_SIGN_IDENTITY="-"

    - name: Build SwiftUI app
      run: xcodebuild -project BlackBoxApp/BlackBoxApp.xcodeproj -scheme BlackBoxApp -configuration Release DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" CODE_SIGN_IDENTITY="-" build


name: BlackBoxApp
options:
  deploymentTarget:
    macOS: "15.0"
  bundleIdPrefix: com.dollhousemediatech
  xcodeVersion: "16.0"

settings:
  SWIFT_VERSION: "5.10"
  VERSIONING_SYSTEM: "apple-generic"

targets:
  BlackBoxApp:
    type: application
    platform: macOS
    sources:
      - BlackBoxApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dollhousemediatech.blackbox
        PRODUCT_NAME: "BlackBox Audio Recorder"
        SWIFT_OBJC_BRIDGING_HEADER: ""
        SWIFT_INCLUDE_PATHS: "$(SRCROOT)/bridge"
        LIBRARY_SEARCH_PATHS:
          - "$(SRCROOT)/../target/release"
          - "$(SRCROOT)/../target/debug"
        OTHER_LDFLAGS:
          - "-lblackbox"
          - "-framework"
          - "CoreAudio"
          - "-framework"
          - "AudioToolbox"
          - "-framework"
          - "Security"
          - "-framework"
          - "Carbon"
        IMPORT_PATHS: "$(SRCROOT)/bridge"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: "BlackBox.entitlements"
        CODE_SIGN_STYLE: Automatic
        ARCHS: arm64
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        CURRENT_PROJECT_VERSION: "11"
        MARKETING_VERSION: "1.0.0"
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
    info:
      path: BlackBoxApp/Info.plist
      properties:
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "11"
        LSUIElement: true
        LSMinimumSystemVersion: "15.0"
        NSMicrophoneUsageDescription: "BlackBox Audio Recorder captures audio from your microphone or audio interface and saves it as WAV files stored locally on your Mac. No audio is ever sent over the network."
        NSHumanReadableCopyright: "Copyright © 2026 David Fisher. All rights reserved."
        LSApplicationCategoryType: public.app-category.music
        ITSAppUsesNonExemptEncryption: false
  BlackBoxAppTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - BlackBoxAppTests
    dependencies:
      - target: BlackBoxApp
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/BlackBox Audio Recorder.app/Contents/MacOS/BlackBox Audio Recorder"
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_INCLUDE_PATHS: "$(SRCROOT)/bridge"
        IMPORT_PATHS: "$(SRCROOT)/bridge"
schemes:
  BlackBoxApp:
    build:
      targets:
        BlackBoxApp: all
        BlackBoxAppTests: [test]
    test:
      targets:
        - BlackBoxAppTests
